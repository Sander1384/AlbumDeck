services:
  albumdeck:
    image: ghcr.io/sander1384/albumdeck:v0.3.47
    container_name: albumdeck
    restart: unless-stopped
    environment:
      NAVIDROME_URL: "https://music.example.com"
      NAVIDROME_USER: "your_user"
      NAVIDROME_PASS: "your_pass_or_token"
      NAVIDROME_CLIENT: "albumdeck-app"
      NAVIDROME_ALLOW_INSECURE_TLS: "false"
      NAVIDROME_ALBUM_BATCH_SIZE: "500"
      NAVIDROME_MAX_ALBUMS: "20000"
      DISCOGS_TOKEN: ""
      APP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - /volume1/docker/albumdeck/backend-data:/app/.data
